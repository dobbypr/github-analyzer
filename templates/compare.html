<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compare Repositories - GitHub Analyzer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
    <script>
        let repoCount = 2;
        
        function addRepo() {
            if (repoCount >= 5) {
                alert('Maximum 5 repositories');
                return;
            }
            repoCount++;
            const container = document.getElementById('repo-inputs');
            const div = document.createElement('div');
            div.className = 'repo-input flex gap-2';
            div.innerHTML = `
                <input type="text" placeholder="owner/repo" 
                    class="repo-field flex-1 px-4 py-3 bg-gray-700 border border-gray-600 rounded-lg text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500">
                <button type="button" onclick="removeRepo(this)" class="text-red-400 hover:text-red-300 px-2">×</button>
            `;
            container.appendChild(div);
        }
        
        function removeRepo(btn) {
            if (repoCount <= 2) {
                alert('Minimum 2 repositories');
                return;
            }
            btn.parentElement.remove();
            repoCount--;
        }
        
        function compareRepos(e) {
            e.preventDefault();
            const inputs = document.querySelectorAll('.repo-field');
            const repos = [];
            
            for (const input of inputs) {
                const val = input.value.trim();
                if (!val) continue;
                
                let owner, repo;
                if (val.includes('github.com')) {
                    const match = val.match(/github\.com\/([^\/]+)\/([^\/\s]+)/);
                    if (match) {
                        owner = match[1];
                        repo = match[2].replace(/\.git$/, '');
                    }
                } else {
                    const parts = val.split('/');
                    if (parts.length === 2) {
                        owner = parts[0];
                        repo = parts[1];
                    }
                }
                
                if (owner && repo) {
                    repos.push(`${owner}/${repo}`);
                }
            }
            
            if (repos.length < 2) {
                alert('Please enter at least 2 valid repositories');
                return;
            }
            
            // Show loading
            const btn = document.getElementById('compare-btn');
            const btnText = document.getElementById('btn-text');
            const spinner = document.getElementById('btn-spinner');
            
            btn.disabled = true;
            btnText.textContent = 'Comparing...';
            spinner.classList.remove('hidden');
            
            setTimeout(() => {
                window.location.href = '/compare/' + repos.join('/');
            }, 300);
        }
    </script>
</head>
<body class="bg-gray-900 text-white min-h-screen">
    <div class="max-w-4xl mx-auto px-6 py-20">
        <div class="text-center mb-12">
            <h1 class="text-5xl font-bold mb-4">📊 Compare Repos</h1>
            <p class="text-xl text-gray-400">Side-by-side repository analysis</p>
        </div>

        <div class="bg-gray-800 rounded-2xl p-8 shadow-2xl">
            <form onsubmit="compareRepos(event)" class="space-y-4">
                <div id="repo-inputs" class="space-y-3">
                    <div class="repo-input">
                        <input type="text" placeholder="e.g., openclaw/openclaw" 
                            class="repo-field w-full px-4 py-3 bg-gray-700 border border-gray-600 rounded-lg text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div class="repo-input">
                        <input type="text" placeholder="e.g., microsoft/vscode" 
                            class="repo-field w-full px-4 py-3 bg-gray-700 border border-gray-600 rounded-lg text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                </div>
                
                <button type="button" onclick="addRepo()" class="text-blue-400 hover:text-blue-300 text-sm font-medium">
                    + Add another repository
                </button>
                
                <button id="compare-btn" type="submit"
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-6 rounded-lg transition flex items-center justify-center gap-2 mt-4">
                    <span id="btn-text">Compare Repositories</span>
                    <svg id="btn-spinner" class="animate-spin h-5 w-5 text-white hidden" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                </button>
            </form>
        </div>

        <div class="mt-8 text-center">
            <a href="/" class="text-gray-400 hover:text-white">← Single repository analysis</a>
        </div>
    </div>
</body>
</html>
